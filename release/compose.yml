services:
  server:
    container_name: doodlebot-ai-live-server
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      # host:container — uvicorn binds 0.0.0.0:5000 inside the container.
      - "5000:5000"
    environment:
      # API keys and admin token are read from the host environment (see
      # config.py). Defaults apply if unset: ADMIN_TOKEN falls back to "test".
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-test}
    volumes:
      # Persist runtime data and serve static assets. Targets live under the
      # container WORKDIR (/app/server), matching the code's relative paths.
      - ./combined:/app/server/combined
      - ./pending:/app/server/pending
      - ./sketches:/app/server/sketches
      - ./static:/app/server/static
      - ./presets.json:/app/server/presets.json
    restart: unless-stopped
